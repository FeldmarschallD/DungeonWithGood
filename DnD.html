<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(*^_^*)Dungeon(*^_^*)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #back {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #1a1a1a;
        }

        #bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #bg-img.loaded {
            opacity: 1;
        }

        #char {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 80vh;
            max-width: 90vw;
            object-fit: contain;
            object-position: bottom center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            z-index: 50;
            pointer-events: none;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
        }

        #char.visible {
            opacity: 1;
        }

        #player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 100;
            min-width: 450px;
        }

        #player.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(100px);
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            font-size: 18px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.active {
            color: #4facfe;
            background: rgba(79, 172, 254, 0.2);
        }

        .prog-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .prog-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 3px;
        }

        .time {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .vol-box {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100px;
        }

        .vol-slide {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .vol-fill {
            height: 100%;
            background: white;
            width: 70%;
            border-radius: 2px;
            transition: width 0.1s;
        }

        .track {
            color: white;
            font-size: 14px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #f-inp {
            display: none;
        }

        #s-inp {
            display: none;
        }

        .empty {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 18px;
            pointer-events: none;
        }

        .empty.hidden {
            display: none;
        }

        #dice-m {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 200;
            opacity: 0;
            transition: all 0.2s ease;
        }

        #dice-m.visible {
            display: grid;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .d-b {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
            position: relative;
            overflow: hidden;
        }

        .d-b:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .d-b:active {
            transform: translateY(-2px) scale(0.95);
        }

        .d-b .d-l {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: normal;
        }

        .d-b .d-r {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.9);
            opacity: 0;
            transition: opacity 0.1s;
        }

        .d-b .d-r.show {
            opacity: 1;
        }

        .d-b .d-r.min {
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.6);
        }

        .d-b .d-r.max {
            color: #ffdd00;
            text-shadow: 0 0 20px rgba(255, 221, 0, 0.6);
        }

        .d-b .d-r.norm {
            color: #ffffff;
        }

        #d-over {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 199;
            display: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #d-over.visible {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="back">
        <img id="bg-img" src="" alt="Background">
    </div>

    <img id="char" src="" alt="Character">

    <div id="d-over"></div>

    <div id="dice-m">
        <button class="d-b" data-s="4">
            <span>d4</span>
            <span class="d-l">4</span>
            <span class="d-r"></span>
        </button>
        <button class="d-b" data-s="6">
            <span>d6</span>
            <span class="d-l">6</span>
            <span class="d-r"></span>
        </button>
        <button class="d-b" data-s="8">
            <span>d8</span>
            <span class="d-l">8</span>
            <span class="d-r"></span>
        </button>
        <button class="d-b" data-s="10">
            <span>d10</span>
            <span class="d-l">10</span>
            <span class="d-r"></span>
        </button>
        <button class="d-b" data-s="12">
            <span>d12</span>
            <span class="d-l">12</span>
            <span class="d-r"></span>
        </button>
        <button class="d-b" data-s="20">
            <span>d20</span>
            <span class="d-l">20</span>
            <span class="d-r"></span>
        </button>
        <button class="d-b" data-s="100">
            <span>d100</span>
            <span class="d-l">100</span>
            <span class="d-r"></span>
        </button>
    </div>

    <div id="player" class="hidden">
        <button class="btn" id="pl-btn">▶</button>
        
        <div class="prog-box">
            <div class="prog-bar" id="p-bar">
                <div class="prog-fill" id="p-fill"></div>
            </div>
            <div class="time">
                <span id="cur-t">0:00</span>
                <span id="dur">0:00</span>
            </div>
        </div>

        <div class="vol-box">
            <span style="color: white; font-size: 16px;">🔊</span>
            <div class="vol-slide" id="v-slide">
                <div class="vol-fill" id="v-fill"></div>
            </div>
        </div>

        <button class="btn active" id="loop-btn">🔁</button>

        <div class="track" id="t-name">P</div>
    </div>

    <input type="file" id="f-inp" accept="audio/*,image/*" multiple>
    <input type="file" id="s-inp" accept="image/*">

    <audio id="aud" preload="metadata" loop></audio>

    <script>
        var bg = document.getElementById('bg-img');
        var spr = document.getElementById('char');
        var plr = document.getElementById('player');
        var aud = document.getElementById('aud');
        var plb = document.getElementById('pl-btn');
        var lpb = document.getElementById('loop-btn');
        var pbar = document.getElementById('p-bar');
        var pfil = document.getElementById('p-fill');
        var vsl = document.getElementById('v-slide');
        var vfil = document.getElementById('v-fill');
        var ct = document.getElementById('cur-t');
        var dur = document.getElementById('dur');
        var tn = document.getElementById('t-name');
        var finp = document.getElementById('f-inp');
        var sinp = document.getElementById('s-inp');
        var dm = document.getElementById('dice-m');
        var dov = document.getElementById('d-over');
        var dbtns = document.querySelectorAll('.d-b');

        var igraet = false;
        var vidim = true;
        var poKrugu = true;
        var vol = 0.7;
        var fotoUrl = null;
        var muzUrl = null;
        var sprUrl = null;
        var sprVidim = false;
        var dOpen = false;
        var shag = 5;

        aud.volume = vol;
        aud.loop = true;
        vfil.style.width = (vol * 100) + '%';

        function ft(s) {
            if (isNaN(s)) return '0:00';
            var m = Math.floor(s / 60);
            var sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function nazad() {
            if (!muzUrl) return;
            var nt = Math.max(0, aud.currentTime - shag);
            aud.currentTime = nt;
        }

        function vpered() {
            if (!muzUrl) return;
            var nt = Math.min(aud.duration, aud.currentTime + shag);
            aud.currentTime = nt;
        }

        function pereklyuchitPovtor() {
            poKrugu = !poKrugu;
            aud.loop = poKrugu;
            if (poKrugu) {
                lpb.classList.add('active');
                lpb.style.color = '#4facfe';
            } else {
                lpb.classList.remove('active');
                lpb.style.color = 'white';
            }
        }

        function postavitFon(url) {
            if (!url) return;
            bg.classList.remove('loaded');
            setTimeout(function() {
                if (fotoUrl) URL.revokeObjectURL(fotoUrl);
                fotoUrl = url;
                bg.src = url;
                bg.onload = function() {
                    bg.classList.add('loaded');
                };
            }, 1000);
        }

        function postavitSprajt(url) {
            if (!url) return;
            spr.classList.remove('visible');
            setTimeout(function() {
                if (sprUrl) URL.revokeObjectURL(sprUrl);
                sprUrl = url;
                spr.src = url;
                spr.onload = function() {
                    sprVidim = true;
                    spr.classList.add('visible');
                };
            }, 500);
        }

        function skritSprajt() {
            sprVidim = false;
            spr.classList.remove('visible');
        }

        function pokazatSprajt() {
            if (sprUrl) {
                sprVidim = true;
                spr.classList.add('visible');
            }
        }

        function postavitMuz(url, name) {
            if (!url) return;
            aud.pause();
            igraet = false;
            plb.textContent = '▶';
            if (muzUrl) URL.revokeObjectURL(muzUrl);
            muzUrl = url;
            aud.src = url;
            tn.textContent = name || 'Нет названия';
            plr.classList.remove('hidden');
            aud.load();
            aud.play().then(function() {
                igraet = true;
                plb.textContent = '⏸';
            }).catch(function() {});
        }

        function pereklyuchitMenu() {
            dOpen = !dOpen;
            if (dOpen) {
                dov.classList.add('visible');
                dm.classList.add('visible');
            } else {
                dov.classList.remove('visible');
                dm.classList.remove('visible');
                setTimeout(function() {
                    dbtns.forEach(function(btn) {
                        var r = btn.querySelector('.d-r');
                        r.classList.remove('show', 'min', 'max', 'norm');
                    });
                }, 200);
            }
        }

        function brositKubik(grani) {
            return Math.floor(Math.random() * grani) + 1;
        }

        dbtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                var g = parseInt(btn.dataset.s);
                var res = brositKubik(g);
                var el = btn.querySelector('.d-r');
                el.textContent = res;
                el.classList.remove('min', 'max', 'norm');
                if (res === 1) {
                    el.classList.add('min');
                } else if (res === g) {
                    el.classList.add('max');
                } else {
                    el.classList.add('norm');
                }
                el.classList.add('show');
            });
        });

        dov.addEventListener('click', pereklyuchitMenu);

        finp.addEventListener('change', function(e) {
            var files = Array.from(e.target.files);
            var imgs = files.filter(function(f) { return f.type.startsWith('image/'); });
            var muzs = files.filter(function(f) { return f.type.startsWith('audio/'); });
            if (imgs.length > 0) {
                var u = URL.createObjectURL(imgs[0]);
                postavitFon(u);
            }
            if (muzs.length > 0) {
                var u = URL.createObjectURL(muzs[0]);
                postavitMuz(u, muzs[0].name);
            }
        });

        sinp.addEventListener('change', function(e) {
            var f = e.target.files[0];
            if (f && f.type.startsWith('image/')) {
                var u = URL.createObjectURL(f);
                postavitSprajt(u);
            }
        });

        function playPause() {
            if (!muzUrl) return;
            if (igraet) {
                aud.pause();
                plb.textContent = '▶';
            } else {
                aud.play();
                plb.textContent = '⏸';
            }
            igraet = !igraet;
        }

        aud.addEventListener('timeupdate', function() {
            var pr = (aud.currentTime / aud.duration) * 100;
            pfil.style.width = pr + '%';
            ct.textContent = ft(aud.currentTime);
        });

        aud.addEventListener('loadedmetadata', function() {
            dur.textContent = ft(aud.duration);
        });

        aud.addEventListener('ended', function() {
            if (!poKrugu) {
                igraet = false;
                plb.textContent = '▶';
                pfil.style.width = '0%';
                ct.textContent = '0:00';
            }
        });

        pbar.addEventListener('click', function(e) {
            if (!muzUrl) return;
            var r = pbar.getBoundingClientRect();
            var p = (e.clientX - r.left) / r.width;
            aud.currentTime = p * aud.duration;
        });

        vsl.addEventListener('click', function(e) {
            var r = vsl.getBoundingClientRect();
            var p = (e.clientX - r.left) / r.width;
            vol = Math.max(0, Math.min(1, p));
            vfil.style.width = (vol * 100) + '%';
            aud.volume = vol;
        });

        plb.addEventListener('click', playPause);
        lpb.addEventListener('click', pereklyuchitPovtor);

        document.addEventListener('keydown', function(e) {
            if (dOpen && e.code !== 'KeyD') return;
            
            if (e.code === 'Space') {
                e.preventDefault();
                playPause();
            }
            
            if (e.code === 'KeyM') {
                vidim = !vidim;
                if (vidim) {
                    plr.classList.remove('hidden');
                } else {
                    plr.classList.add('hidden');
                }
            }
            
            if (e.code === 'ArrowUp') {
                e.preventDefault();
                vol = Math.min(1, vol + 0.1);
                vfil.style.width = (vol * 100) + '%';
                aud.volume = vol;
            }
            
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                vol = Math.max(0, vol - 0.1);
                vfil.style.width = (vol * 100) + '%';
                aud.volume = vol;
            }

            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                nazad();
            }

            if (e.code === 'ArrowRight') {
                e.preventDefault();
                vpered();
            }
            
            if (e.code === 'KeyK') {
                finp.click();
            }

            if (e.code === 'KeyL') {
                pereklyuchitPovtor();
            }

            if (e.code === 'KeyO') {
                sinp.click();
            }

            if (e.code === 'KeyI') {
                if (sprVidim) {
                    skritSprajt();
                } else {
                    pokazatSprajt();
                }
            }

            if (e.code === 'KeyD') {
                e.preventDefault();
                pereklyuchitMenu();
            }
        });

        window.addEventListener('beforeunload', function() {
            if (fotoUrl) URL.revokeObjectURL(fotoUrl);
            if (muzUrl) URL.revokeObjectURL(muzUrl);
            if (sprUrl) URL.revokeObjectURL(sprUrl);
        });
    </script>
</body>
</html>
